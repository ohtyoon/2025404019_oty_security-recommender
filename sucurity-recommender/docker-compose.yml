version: '3.8'

services:
  backend:
    build: ./back
    container_name: security-backend
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: ./front
    container_name: security-frontend
    ports:
      - "8501:8501"
    environment:

      - BACKEND_URL=http://35.172.221.61:8000
    restart: always
    depends_on:
      - backend
